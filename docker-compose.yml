services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-viralscript}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-viralscript_dev}
      POSTGRES_DB: ${POSTGRES_DB:-viralscript}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viralscript}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-rustfs_admin}
      RUSTFS_SECRET_KEY: ${STORAGE_SECRET_KEY:-change_me_strong_password}
    volumes:
      - rustfs_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:9000/ | grep -qE '(200|403)'"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-viralscript}:${POSTGRES_PASSWORD:-viralscript_dev}@postgres:5432/${POSTGRES_DB:-viralscript}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      BACKEND_PORT: 3001
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      PROXY_URL: ${PROXY_URL:-}
      SOCIALKIT_API_KEY: ${SOCIALKIT_API_KEY:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://rustfs:9000}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-rustfs_admin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-change_me_strong_password}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-viralscript}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && node dist/src/cli/init-storage.js && node dist/src/main"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NODE_ENV: production
      BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
